<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predectiva — Database Viewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            min-height: 100vh;
            color: #e2e8f0;
            padding: 40px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #38bdf8;
        }

        .logo i { font-size: 1.8rem; }

        .subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .back-btn {
            text-decoration: none;
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #38bdf8;
            padding: 10px 20px;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(56, 189, 248, 0.2);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px 30px;
            backdrop-filter: blur(12px);
            flex: 1;
            max-width: 200px;
        }

        .stat-card .stat-num {
            font-size: 2rem;
            font-weight: 700;
            color: #38bdf8;
        }

        .stat-card .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .db-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        .db-card-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .db-card-header h2 {
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
        }

        .db-card-header h2 i { color: #38bdf8; }

        .clear-btn {
            background: rgba(244, 63, 94, 0.15);
            border: 1px solid rgba(244, 63, 94, 0.3);
            color: #fb7185;
            padding: 8px 18px;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn:hover {
            background: rgba(244, 63, 94, 0.3);
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            background: rgba(56, 189, 248, 0.08);
            padding: 16px 30px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #38bdf8;
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease;
        }

        tbody tr:last-child { border-bottom: none; }

        tbody tr:hover {
            background: rgba(56, 189, 248, 0.05);
        }

        tbody td {
            padding: 18px 30px;
            font-size: 0.9rem;
            color: #cbd5e1;
            vertical-align: middle;
        }

        tbody td .id-badge {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        tbody td .password-mask {
            color: #64748b;
            letter-spacing: 3px;
            font-size: 0.9rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 40px;
            color: #475569;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #334155;
        }

        .empty-state p {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #64748b;
        }

        .empty-state span {
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>

<body>
    <header>
        <div>
            <div class="logo"><i class="fa-solid fa-heart-pulse"></i> Predectiva</div>
            <div class="subtitle">User Database Viewer</div>
        </div>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
    </header>

    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-num" id="total-count">0</div>
            <div class="stat-label">Total Users</div>
        </div>
    </div>

    <div class="db-card">
        <div class="db-card-header">
            <h2><i class="fa-solid fa-database"></i> Registered Users (Stored in LocalStorage)</h2>
            <button class="clear-btn" onclick="clearDatabase()"><i class="fa-solid fa-trash"></i> Clear All</button>
        </div>
        <table id="user-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="user-body">
                <!-- Populated by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        function loadUsers() {
            const users = JSON.parse(localStorage.getItem('usersDB')) || [];
            const tbody = document.getElementById('user-body');
            const totalCount = document.getElementById('total-count');

            totalCount.textContent = users.length;
            tbody.innerHTML = '';

            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4">
                            <div class="empty-state">
                                <i class="fa-solid fa-user-slash"></i>
                                <p>No users registered yet.</p>
                                <span>Go back to the login page and sign up first.</span>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            users.forEach((user, index) => {
                const row = document.createElement('tr');
                const maskedPassword = '●'.repeat(Math.min(user.password.length, 8));
                row.innerHTML = `
                    <td><span class="id-badge">#${String(index + 1).padStart(3, '0')}</span></td>
                    <td>${user.fullname || '—'}</td>
                    <td>${user.email}</td>
                    <td><span class="password-mask">${maskedPassword}</span></td>`;
                tbody.appendChild(row);
            });
        }

        function clearDatabase() {
            if (confirm('Are you sure you want to delete ALL registered users? This cannot be undone.')) {
                localStorage.removeItem('usersDB');
                loadUsers();
            }
        }

        loadUsers();
    </script>
</body>

</html>
