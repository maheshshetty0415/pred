<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How It Works — Predectiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 40px;
        }

        /* ── Ambient background orbs ── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            animation: floatOrb 20s ease-in-out infinite;
        }
        .orb-1 {
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(56,189,248,0.15), transparent 70%);
            top: -200px; right: -100px;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(216,180,254,0.2), transparent 70%);
            bottom: -150px; left: -150px;
            animation-direction: reverse;
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.05); }
        }

        /* ── Video Container ── */
        .video-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            animation: fadeInUp 0.8s ease forwards;
        }

        .video-wrapper {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            background: #000;
            line-height: 0;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        video {
            width: 100%;
            height: auto;
            max-height: 80vh;
        }

        .header-content {
            text-align: center;
            margin-bottom: 30px;
            z-index: 1;
        }

        .header-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            position: absolute;
            top: -60px;
            left: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }

        .back-btn:hover {
            color: #38bdf8;
            transform: translateX(-5px);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header-content h1 { font-size: 1.8rem; }
            .video-card { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>

    <div class="header-content">
        <h1>Learn How It Works</h1>
    </div>

    <div class="video-card">
        <a href="hero.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Go Back
        </a>
        <div class="video-wrapper">
            <video controls autoplay muted>
                <source src="WhatsApp Video 2026-03-14 at 2.09.18 AM.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <script>
        // Smooth background spotlight effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            document.body.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(56, 189, 248, 0.05) 0%, transparent 80%), linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%)`;
        });

        // Prevent right-click to protect source code
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            alert("Right click is disabled by the developer.");
        });
    </script>
</body>
</html>
